<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2634"/>
      <stop offset="60%" stop-color="#D4A57420"/>
      <stop offset="100%" stop-color="#1a2634"/>
    </linearGradient>
    <linearGradient id="glass1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3498DB18"/>
      <stop offset="100%" stop-color="#D4A57415"/>
    </linearGradient>
    <linearGradient id="glass2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A57415"/>
      <stop offset="100%" stop-color="#3498DB18"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="1000" fill="url(#sky)"/>

  <!-- Horizon glow -->
  <ellipse cx="400" cy="600" rx="500" ry="120" fill="#D4A57408"/>

  <!-- Building 1 — far left -->
  <rect x="20" y="200" width="80" height="800" fill="#1e2e3e"/>
  <rect x="22" y="202" width="76" height="796" fill="url(#glass1)" opacity="0.4"/>
  <!-- windows -->
  <g fill="#D4A57430">
    <rect x="28" y="220" width="14" height="20"/><rect x="48" y="220" width="14" height="20"/><rect x="68" y="220" width="14" height="20"/>
    <rect x="28" y="252" width="14" height="20"/><rect x="48" y="252" width="14" height="20"/><rect x="68" y="252" width="14" height="20"/>
    <rect x="28" y="284" width="14" height="20"/><rect x="48" y="284" width="14" height="20"/><rect x="68" y="284" width="14" height="20"/>
    <rect x="28" y="316" width="14" height="20"/><rect x="68" y="316" width="14" height="20"/>
    <rect x="28" y="348" width="14" height="20"/><rect x="48" y="348" width="14" height="20"/><rect x="68" y="348" width="14" height="20"/>
  </g>

  <!-- Building 2 — center tall -->
  <rect x="160" y="80" width="160" height="920" fill="#1b2c3e"/>
  <rect x="162" y="82" width="156" height="916" fill="url(#glass1)" opacity="0.5"/>
  <!-- vertical lines -->
  <line x1="200" y1="80" x2="200" y2="1000" stroke="#D4A57420" stroke-width="1"/>
  <line x1="240" y1="80" x2="240" y2="1000" stroke="#D4A57420" stroke-width="1"/>
  <line x1="280" y1="80" x2="280" y2="1000" stroke="#D4A57420" stroke-width="1"/>
  <!-- windows lit -->
  <g fill="#D4A57445">
    <rect x="168" y="100" width="28" height="36"/><rect x="204" y="100" width="28" height="36"/><rect x="240" y="100" width="28" height="36"/><rect x="276" y="100" width="28" height="36"/>
    <rect x="168" y="148" width="28" height="36"/><rect x="240" y="148" width="28" height="36"/><rect x="276" y="148" width="28" height="36"/>
    <rect x="204" y="196" width="28" height="36"/><rect x="240" y="196" width="28" height="36"/>
    <rect x="168" y="244" width="28" height="36"/><rect x="276" y="244" width="28" height="36"/>
    <rect x="204" y="292" width="28" height="36"/><rect x="240" y="292" width="28" height="36"/><rect x="276" y="292" width="28" height="36"/>
  </g>
  <!-- warm floor -->
  <rect x="160" y="700" width="160" height="60" fill="#D4A57408"/>

  <!-- Building 3 — right side -->
  <rect x="420" y="140" width="200" height="860" fill="#1c2d40"/>
  <rect x="422" y="142" width="196" height="856" fill="url(#glass2)" opacity="0.5"/>
  <line x1="460" y1="140" x2="460" y2="1000" stroke="#3498DB18" stroke-width="1"/>
  <line x1="500" y1="140" x2="500" y2="1000" stroke="#3498DB18" stroke-width="1"/>
  <line x1="540" y1="140" x2="540" y2="1000" stroke="#3498DB18" stroke-width="1"/>
  <line x1="580" y1="140" x2="580" y2="1000" stroke="#3498DB18" stroke-width="1"/>
  <g fill="#3498DB30">
    <rect x="428" y="160" width="24" height="32"/><rect x="460" y="160" width="24" height="32"/><rect x="492" y="160" width="24" height="32"/>
    <rect x="428" y="204" width="24" height="32"/><rect x="524" y="204" width="24" height="32"/><rect x="556" y="204" width="24" height="32"/>
    <rect x="460" y="248" width="24" height="32"/><rect x="492" y="248" width="24" height="32"/>
    <rect x="428" y="292" width="24" height="32"/><rect x="492" y="292" width="24" height="32"/><rect x="556" y="292" width="24" height="32"/>
  </g>

  <!-- Building 4 — far right -->
  <rect x="680" y="250" width="120" height="750" fill="#1a2a38"/>
  <rect x="682" y="252" width="116" height="746" fill="url(#glass2)" opacity="0.35"/>
  <g fill="#D4A57425">
    <rect x="690" y="270" width="18" height="26"/><rect x="716" y="270" width="18" height="26"/><rect x="742" y="270" width="18" height="26"/><rect x="768" y="270" width="18" height="26"/>
    <rect x="690" y="308" width="18" height="26"/><rect x="742" y="308" width="18" height="26"/>
    <rect x="716" y="346" width="18" height="26"/><rect x="768" y="346" width="18" height="26"/>
    <rect x="690" y="384" width="18" height="26"/><rect x="742" y="384" width="18" height="26"/><rect x="768" y="384" width="18" height="26"/>
  </g>

  <!-- Ground reflection / floor -->
  <rect x="0" y="880" width="800" height="120" fill="#0d1a26" opacity="0.7"/>
  <line x1="0" y1="880" x2="800" y2="880" stroke="#D4A57430" stroke-width="1"/>

  <!-- Overlay gradient for photographic feel -->
  <rect width="800" height="1000" fill="url(#sky)" opacity="0.35"/>

  <!-- Golden hour glow top-right -->
  <ellipse cx="650" cy="150" rx="200" ry="120" fill="#D4A57412"/>
</svg>
